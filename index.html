    <div class=“instruction”>Tap anywhere to make flowers grow for you ✨</div>

    <script>
        const garden = document.getElementById(‘garden’);
        const colors = [‘#ff7597’, ‘#ffb3c6’, ‘#ffccd5’, ‘#ca8eff’, ‘#ffdf6d’, ‘#8ef7ff’, ‘#ff9ebb’];
function plantFlower(x, y) {
            const instruction = document.querySelector(‘.instruction’);
            if (instruction) instruction.remove();

            const windowHeight = window.innerHeight;
            const stemHeight = windowHeight - y;

            const stem = document.createElement(‘div’);

            stem.style.left = ${x}px;

const bloom = document.createElement(‘div’);
            bloom.classList.add(‘bloom’);
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            bloom.style.backgroundColor = randomColor;
            bloom.style.boxShadow = 0 0 15px ${randomColor};

            stem.appendChild(bloom);
            garden.appendChild(stem);
        }

        document.addEventListener(‘click’, (e) => {
            plantFlower(e.clientX, e.clientY);
        });

        document.addEventListener(‘touchstart’, (e) => {
            const touch = e.touches[0];
            plantFlower(touch.clientX, touch.clientY);
        });
    </script>
