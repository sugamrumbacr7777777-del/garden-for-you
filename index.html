<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>A Garden for My Girl 🌸</title>
    <meta property="og:title" content="A Garden for My Girl 🌸">
    <meta property="og:description" content="You wanted flowers... so I built you a whole garden. ✨">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background-color: #060608;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* Video Styled Center Text */
        .instruction {
            position: absolute; top: 43%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: #fff; z-index: 10; pointer-events: none;
            width: 90%; transition: opacity 0.8s ease;
        }
        .instruction p:first-child { 
            font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #ccc; letter-spacing: 0.5px; 
        }
        .instruction h1 {
            font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 600; margin: 8px 0; letter-spacing: 1px;
            background: linear-gradient(to right, #ff9ebb, #ca8eff, #ffccd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,158,187,0.2);
        }
        .instruction p:last-child { font-size: 0.95rem; color: #888; letter-spacing: 0.5px; font-weight: 300; }

        /* Beautiful Floral Background Card overlay to match video vibe */
        .card-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle outside, rgba(202,142,255,0.05), transparent);
            pointer-events: none; z-index: 1;
        }

        /* Elegant Bottom Buttons Layout */
        .controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 100;
        }
        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 22px; border-radius: 30px;
            color: rgba(255, 255, 255, 0.7); font-size: 0.85rem; font-weight: 400; letter-spacing: 0.5px;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.18); color: #fff; transform: translateY(-2px); }

        /* Aesthetic Floral Code Styling */
        .stem {
            position: absolute; bottom: 0; width: 3px;
            background: linear-gradient(to top, #0f2a15, #245237, #377451);
            border-radius: 2px; transform-origin: bottom center;
            animation: growStem 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .leaf {
            position: absolute; width: 14px; height: 8px;
            background: #245237; border-radius: 50% 0 50% 0;
            opacity: 0; animation: spawnLeaf 0.5s 0.6s ease forwards;
        }
        .leaf.left { left: -12px; transform: rotate(-35deg); transform-origin: right bottom; }
        .leaf.right { right: -12px; transform: rotate(35deg) scaleX(-1); transform-origin: left bottom; }

        .flower-head {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%) scale(0);
            animation: bloom 0.8s 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .petal {
            position: absolute; width: 18px; height: 32px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; transform-origin: bottom center;
            opacity: 0.92;
        }
        .center-core {
            position: absolute; width: 14px; height: 14px;
            background: #ffe381; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffdf6d; z-index: 5;
        }
        @keyframes growStem { from { height: 0; } to { height: var(--h); } }
        @keyframes spawnLeaf { to { opacity: 0.8; } }
        @keyframes bloom { to { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <div id="container">
        <div class="card-bg"></div>
        <div class="instruction" id="instruct">
            <p>Click Anywhere to</p>
            <h1>Plant Flowers</h1>
            <p>✨ or turn on Auto Bloom</p>
        </div>

        <div class="controls">
            <button class="btn" id="clearBtn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                Clear Garden
            </button>
            <button class="btn" id="autoBtn">✨ Auto Bloom</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const instruct = document.getElementById('instruct');
        const clearBtn = document.getElementById('clearBtn');
        const autoBtn = document.getElementById('autoBtn');
        
        let autoInterval = null;
        const colors = [
            ['#ff7597', '#ffccd5'], 
            ['#ca8eff', '#e2bbfd'], 
            ['#ff9ebb', '#fff0f5'], 
            ['#ffbd59', '#ffebd0'], 
            ['#8ef7ff', '#e0ffff']  
        ];

        function createFlower(x, y) {
            if(instruct && instruct.style.opacity !== '0') {
                instruct.style.opacity = '0';
            }
            
            const windowHeight = window.innerHeight;
            const stemHeight = windowHeight - y;
            
            const stem = document.createElement('div');
            stem.classList.add('stem');
            stem.style.left = x + 'px';
            stem.style.setProperty('--h', stemHeight + 'px');
            
            if(stemHeight > 100) {
                const leaf = document.createElement('div');
                leaf.classList.add('leaf', Math.random() > 0.5 ? 'left' : 'right');
                leaf.style.bottom = (stemHeight * 0.4) + 'px';
                stem.appendChild(leaf);
            }
            
            const head = document.createElement('div');
            head.classList.add('flower-head');
            
            const randomColorPair = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 6; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.background = `linear-gradient(to top, ${randomColorPair[0]}, ${randomColorPair[1]})`;
                petal.style.transform = `translate(-50%, -100%) rotate(${i * 60}deg)`;
                petal.style.boxShadow = `0 0 12px ${randomColorPair[0]}40`;
                head.appendChild(petal);
            }
            
            const core = document.createElement('div');
            core.classList.add('center-core');
            head.appendChild(core);
            
            stem.appendChild(head);
            container.appendChild(stem);
        }

        container.addEventListener('click', (e) => {
            if (e.target.closest('.controls')) return;
            createFlower(e.clientX, e.clientY);
        });

        container.addEventListener('touchstart', (e) => {
            if (e.target.closest('.controls')) return;
            createFlower(e.touches[0].clientX, e.touches[0].clientY);
        });

        clearBtn.addEventListener('click', () => {
            const stems = document.querySelectorAll('.stem');
            stems.forEach(s => s.remove());
            if(instruct) instruct.style.opacity = '1';
        });

        autoBtn.addEventListener('click', () => {
            if(autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                autoBtn.innerText = "✨ Auto Bloom";
                autoBtn.style.background = "rgba(255, 255, 255, 0.08)";
            } else {
                autoBtn.innerText = "🛑 Stop Auto";
                autoBtn.style.background = "rgba(255, 158, 187, 0.25)";
                autoInterval = setInterval(() => {
                    const rx = Math.random() * window.innerWidth;
                    const ry = Math.random() * (window.innerHeight * 0.7) + (window.innerHeight * 0.15);
                    createFlower(rx, ry);
                }, 400);
            }
        });
    </script>
</body>
</html>
