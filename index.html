<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>A Garden for My Girl 🌸</title>
    <meta property="og:title" content="A Garden for My Girl 🌸">
    <meta property="og:description" content="You wanted flowers... so I built you a whole garden. ✨">
    <meta property="og:type" content="website">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        #container { position: relative; width: 100%; height: 100%; }
        .instruction {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: #fff; z-index: 10; pointer-events: none;
            width: 90%;
        }
        .instruction p { font-size: 1.1rem; color: #aaa; letter-spacing: 1px; font-style: italic; }
        .instruction h1 {
            font-size: 2.5rem; font-weight: 400; margin: 10px 0; letter-spacing: 2px;
            background: linear-gradient(45deg, #ff9ebb, #ca8eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stem {
            position: absolute; bottom: 0; width: 2px;
            background: linear-gradient(to top, #113317, #2c6346);
            transform-origin: bottom center;
            animation: growStem 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .flower-head {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%) scale(0);
            animation: bloom 0.7s 1.1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .petal {
            position: absolute; width: 16px; height: 28px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; transform-origin: bottom center;
            opacity: 0.9;
        }
        .center-core {
            position: absolute; width: 12px; height: 12px;
            background: #ffdf6d; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #ffdf6d;
        }
        @keyframes growStem { from { height: 0; } to { height: var(--h); } }
        @keyframes bloom { to { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <div id="container">
        <div class="instruction" id="instruct">
            <p>Tap Anywhere to</p>
            <h1>Plant Flowers</h1>
            <p>✨ make a beautiful garden ✨</p>
        </div>
    </div>
    <script>
        const container = document.getElementById('container');
        const instruct = document.getElementById('instruct');
        const colors = [
            ['#ff7597', '#ffb3c6'],
            ['#ca8eff', '#e2bbfd'],
            ['#ff9ebb', '#ffccd5'],
            ['#ffbd59', '#ffde59'],
            ['#8ef7ff', '#bffffa']
        ];

        function createFlower(x, y) {
            if(instruct) instruct.style.display = 'none';
            const windowHeight = window.innerHeight;
            const stemHeight = windowHeight - y;
            
            const stem = document.createElement('div');
            stem.classList.add('stem');
            stem.style.left = x + 'px';
            stem.style.setProperty('--h', stemHeight + 'px');
            
            const head = document.createElement('div');
            head.classList.add('flower-head');
            
            const randomColorPair = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 6; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.background = `linear-gradient(to top, ${randomColorPair[0]}, ${randomColorPair[1]})`;
                petal.style.transform = `translate(-50%, -100%) rotate(${i * 60}deg)`;
                petal.style.boxShadow = `0 0 10px ${randomColorPair[0]}`;
                head.appendChild(petal);
            }
            
            const core = document.createElement('div');
            core.classList.add('center-core');
            head.appendChild(core);
            
            stem.appendChild(head);
            container.appendChild(stem);
        }

        window.addEventListener('click', (e) => { createFlower(e.clientX, e.clientY); });
        window.addEventListener('touchstart', (e) => { createFlower(e.touches[0].clientX, e.touches[0].clientY); });
    </script>
</body>
</html>
